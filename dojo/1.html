<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div {
        width: 100px;
        height: 100px;
        background-color: rgb(247, 199, 199);
    }
    .box1 {
        transform: translateX(100px);
    }
    .box2 {
        transform: translateY(100px);
    }
    .box3 {
        transform: translateY(-100px);
    }
    .box4 {
        transform: translateX(100px) translateY(100px);
    }
</style>
<body>
    <div class="box1">
        <h1>BOX!</h1>
    </div>
    <div class="box2">
        <h1>BOX2</h1>
    </div>
    <div class="box3">
        <h1>BOX3</h1>
    </div>
    <div class="box4">
        <h1>BOX4</h1>
    </div>
</body>

</html>
